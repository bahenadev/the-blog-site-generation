<html>

    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="preload" href="./styles/style.css" as="style" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>The Blog Site</title>
  </head>

  <body>
    <header>
      <h1 class="titulo">The Blog Site</h1>
    </header>

    <div class="nav-bg">
      <nav class="navegacion-principal contenedor">
        <a href="#">Inicio</a>
        <a href="nosotros.html">Quiénes somos</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </div>

    <section class="hero">
      <div class="contenido-hero">
        <h2>Blog de Desarrollo Web</h2>

        <h3>El mejor blog para desarrolladores</h3>

        <a href="#" class="boton">Contactar</a>
      </div>
    </section>

    <section>
      <h2>Contacto</h2>

      <form action="">
        <fieldset>
          <legend>Contactános llenando todo los campos</legend>

          <div>
            <label for="">Nombre:</label>
            <input type="text" placeholder="Tu nombre" />
          </div>

          <div>
            <label for="">Teléfono:</label>
            <input type="tel" placeholder="Tu teléfono" />
          </div>

          <div>
            <label for="">Correo Electrónico:</label>
            <input type="email" placeholder="Tu correo favorito" />
          </div>

          <div>
            <label for="">Mensaje:</label>

            <textarea name="" id=""></textarea>
          </div>

          <div>
            <input type="submit" value="Enviar" />
          </div>
        </fieldset>
      </form>
    </section>

    <footer class="footer">
      <p>
        Todos los derechos reservados. Javier Bahena - contacto@email.com. The
        site blog.
      </p>
    </footer>
